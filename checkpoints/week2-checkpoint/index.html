<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rabbit Run: Tales of the Warren - Week 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: radial-gradient(circle at 50% -10%, #eaf4ff 0%, #cfe2f3 75%);
      color: #2d3e50; font-family: "Courier New", monospace;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    h1 { letter-spacing: 4px; color: #4a7ba6; text-shadow: 1px 1px 0 #ffffff; font-size: 20px; }
    #game { image-rendering: pixelated; border: 4px solid #7fb2dc; border-radius: 6px; background: #bfe0f2;
      box-shadow: 0 10px 30px rgba(74,123,166,0.25), 0 0 0 8px #e7f1fb; }
    .controls { font-size: 12px; color: #5a7a93; } .controls b { color: #2d3e50; }
  </style>
</head>
<body>
  <h1>✦ RABBIT RUN: TALES OF THE WARREN - Week 2 ✦</h1>
  <canvas id="game"></canvas>
  <div class="controls"><b>Arrows / WASD</b> move &bull; <b>Space</b> attack (you now collide with bushes & rocks!)</div>
  <script type="module" src="js/game.js"></script>
</body>
</html>
